version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
      KAFKA_LOG_RETENTION_HOURS: 24
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: logfoundry
      POSTGRES_USER: logfoundry
      POSTGRES_PASSWORD: logfoundry
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "work_mem=4MB"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logfoundry -d logfoundry"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC_INGEST: logs.ingest
      KAFKA_TOPIC_ALERTS: logs.alerts
      KAFKA_TOPIC_DLT: logs.dead-letter
      POSTGRES_DSN: postgresql://logfoundry:logfoundry@postgres/logfoundry
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_REQUESTS: "1000000"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: logfoundry-api
      LOG_LEVEL: INFO
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  log-writer:
    build:
      context: ./consumers
      dockerfile: Dockerfile
    command: python -m log_writer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC_INGEST: logs.ingest
      KAFKA_TOPIC_DLT: logs.dead-letter
      KAFKA_GROUP_LOG_WRITER: logfoundry-log-writer
      POSTGRES_DSN: postgresql://logfoundry:logfoundry@postgres/logfoundry
      LOG_LEVEL: INFO
    deploy:
      resources:
        limits:
          memory: 192M

  alert-consumer:
    build:
      context: ./consumers
      dockerfile: Dockerfile
    command: python -m alert_consumer
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC_INGEST: logs.ingest
      KAFKA_TOPIC_ALERTS: logs.alerts
      KAFKA_TOPIC_DLT: logs.dead-letter
      KAFKA_GROUP_ALERT: logfoundry-alert
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
    deploy:
      resources:
        limits:
          memory: 192M

  metrics-consumer:
    build:
      context: ./consumers
      dockerfile: Dockerfile
    command: python -m metrics_consumer
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC_INGEST: logs.ingest
      KAFKA_TOPIC_DLT: logs.dead-letter
      KAFKA_GROUP_METRICS: logfoundry-metrics
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
    deploy:
      resources:
        limits:
          memory: 192M

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    command: ["--memory.max-traces", "5000"]
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "8080:8080"
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
